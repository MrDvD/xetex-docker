name: Publish Docker Image

on:
  push:
    paths:
      - 'Dockerfile'
      - 'fonts/'
    branches: [main]
  workflow_dispatch:

jobs:
  push_to_registry:
    name: Push Docker image to GHCR
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set lowercase owner name
        id: get_owner
        run: echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: '${{ github.repository_owner }}'
      
      - name: Get TeX Live Year
        id: get_year
        run: |
          YEAR=$(curl -sI https://mirror.ctan.org/systems/texlive/tlnet/install-tl-unx.tar.gz | grep -oP 'install-tl-\K20\d{2}' || date +%Y)
          echo "year=$YEAR" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.get_owner.outputs.owner }}/xetex-base:${{ steps.get_year.outputs.year }}